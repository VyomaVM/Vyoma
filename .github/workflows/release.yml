name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev build-essential rpm libssl-dev protobuf-compiler libdevmapper-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build UI
        run: |
            cd ui
            npm install
            npm run build
            cd ..

      - name: Build Debian Package
        run: ./packaging/deb/build.sh

      - name: Build RPM Package
        run: ./packaging/rpm/build.sh

      - name: Verify Packages
        run: |
          ls -la dist/
          echo "DEB files:" && ls -la dist/*.deb || echo "No DEB files found"
          echo "RPM files:" && ls -la dist/*.rpm || echo "No RPM files found"

      - name: Create Release & Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.deb
            dist/*.rpm
          generate_release_notes: true
          draft: false
          prerelease: false
