name: Chaos Tests

on:
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - wal_recovery
          - daemon_restart
          - resource_cleanup

  push:
    branches:
      - main
      - develop
    paths:
      - 'crates/vyomad/**'
      - 'Cargo.toml'
      - '.github/workflows/chaos.yml'

  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: read

jobs:
  chaos-tests:
    name: Chaos Tests (${{ matrix.scenario }})
    runs-on: chaos-runner
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: daemon_start_stop
            test_path: chaos_tests::tests::test_daemon_start_stop
          - scenario: sigkill_vm_create
            test_path: chaos_tests::tests::test_sigkill_during_vm_create
          - scenario: wal_corruption
            test_path: chaos_tests::tests::test_wal_corruption_recovery
          - scenario: running_vm_survives
            test_path: chaos_tests::tests::test_running_vm_survives_restart
          - scenario: resource_cleanup
            test_path: chaos_tests::tests::test_resource_cleanup_after_destroy
          - scenario: netns_leak
            test_path: chaos_tests::tests::test_netns_leak_recovery
          - scenario: rapid_restart
            test_path: chaos_tests::tests::test_rapid_restart_stress
          - scenario: cloud_hypervisor_kill
            test_path: chaos_tests::tests::test_cloud_hypervisor_kill_recovery
          - scenario: cow_capacity
            test_path: chaos_tests::tests::test_cow_device_capacity_exhaustion
          - scenario: teleport_failure
            test_path: chaos_tests::tests::test_network_failure_during_teleport

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Build with chaos feature
        run: |
          cargo build --features chaos

      - name: Build test binary
        run: |
          cargo build --features chaos --tests

      - name: Run chaos test
        if: github.event_name == 'workflow_dispatch'
        run: |
          sudo VYOMAD_PATH=./target/debug/vyomad \
            cargo test --features chaos --package vyomad --lib \
            ${{ matrix.test_path }}

      - name: Run push/schedule chaos test
        if: github.event_name != 'workflow_dispatch'
        run: |
          sudo VYOMAD_PATH=./target/debug/vyomad \
            cargo test --features chaos --package vyomad --lib chaos_tests::tests

      - name: Collect logs on failure
        if: failure()
        run: |
          sudo cat /var/log/vyoma/chaos.log || true
          sudo ls -la /var/run/vyoma/ || true

      - name: Cleanup resources
        if: always()
        run: |
          set -e

          echo "Cleaning up TAP interfaces..."
          for iface in $(ip -o link show | awk -F': ' '{print $2}' | grep -E 'tap|vyoma' 2>/dev/null || true); do
            sudo ip link del "$iface" 2>/dev/null || true
          done

          echo "Cleaning up DM devices..."
          for dev in $(ls /dev/mapper/ 2>/dev/null | grep -E 'vyoma|vm-' || true); do
            sudo dmsetup remove "$dev" 2>/dev/null || true
          done

          echo "Cleaning up network namespaces..."
          for ns in $(ls /var/run/netns/ 2>/dev/null | grep -E 'vyoma|vm-' || true); do
            sudo ip netns del "$ns" 2>/dev/null || true
          done

          echo "Cleaning up loop devices..."
          for loop in $(losetup -a 2>/dev/null | grep -E 'vyoma|vm-' | awk -F: '{print $1}' || true); do
            sudo losetup -d "$loop" 2>/dev/null || true
          done

          echo "Cleaning up cgroups..."
          for controller in cpu memory devices pids; do
            for cgroup in $(ls /sys/fs/cgroup/$controller/ 2>/dev/null | grep -E 'vyoma|vm-' || true); do
              sudo rmdir "/sys/fs/cgroup/$controller/$cgroup" 2>/dev/null || true
            done
          done

          echo "Cleaning up leftover processes..."
          pkill -9 -f "vyomad.*test" 2>/dev/null || true
          pkill -9 -f "cloud-hypervisor" 2>/dev/null || true

          echo "Cleanup complete"

  chaos-report:
    name: Chaos Test Report
    runs-on: ubuntu-latest
    needs: chaos-tests
    if: always()
    steps:
      - name: Determine results
        run: |
          RESULT="${{ needs.chaos-tests.result }}"
          echo "Chaos tests result: $RESULT"

          if [ "$RESULT" = "failure" ]; then
            echo "::warning::Some chaos tests failed. Check the test jobs for details."
            exit 1
          elif [ "$RESULT" = "success" ]; then
            echo "All chaos tests passed!"
          fi

      - name: Generate report
        run: |
          echo "## Chaos Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SCENARIOS=("daemon_start_stop" "sigkill_vm_create" "wal_corruption" "running_vm_survives" "resource_cleanup" "netns_leak" "rapid_restart" "cloud_hypervisor_kill" "cow_capacity" "teleport_failure")
          TOTAL=${#SCENARIOS[@]}

          echo "| Scenario | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.chaos-tests.result }}" = "success" ]; then
            echo "| Passed | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | 0 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":white_check_mark: All chaos tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Passed | 0 |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo ":x: Some chaos tests failed. Review the job logs for details." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi