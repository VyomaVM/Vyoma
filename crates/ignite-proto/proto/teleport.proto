syntax = "proto3";

package ignite.teleport.v1;

option go_package = "ignite/teleport/v1;igniteteleportv1";

service TeleportService {
    // Bidirectional stream for backpressure and flow control
    rpc TeleportVm (stream TeleportChunk) returns (stream TeleportAck);
}

// Representing different types of content sent in a TeleportChunk
message VmMetadata {
    string id = 1;
    string config_json = 2; // Full VM configuration as JSON
    uint64 memory_size_bytes = 3; 
}

message TeleportChunk {
    string session_id = 1;      // Unique migration session
    uint64 chunk_sequence = 2;  // Ordering mechanism

    oneof content {
        VmMetadata metadata = 3; // Sent first to prepare target
        bytes memory_chunk = 4;  // ZSTD compressed chunk of VM Memory
        bytes state_chunk = 5;   // VM Device State
    }
}

message TeleportAck {
    string session_id = 1;
    uint64 processed_sequence = 2;
    bool received = 3;
    string error_msg = 4;
}
